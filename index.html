<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeonKeys | Archive Access</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>AEON KEYS</h1>
        <div class="divider"></div>
        <p class="instruction">Input the decoded sequence to proceed.</p>
        
        <!-- Caesar Cipher: Shift +3 -->
        <p class="cipher-text">D VLPSOH VKLIW UHYHDOV WKH SDWK</p>
        
        <div class="input-group">
            <input type="text" id="keyInput" placeholder="Enter sequence..." autocomplete="off">
            <button id="submitBtn">SUBMIT</button>
        </div>
        <p id="feedback" class="hidden"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
