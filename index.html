<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeon Keys</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" id="main-container">
        <h1>AEON KEYS</h1>
        <div id="cipher-display">
          <p id="cipher-quote">MEN FREELY BELIEVE THAT WHICH THEY DESIRE.</p>
            <p id="cipher-text"></p>
        </div>
        <div class="input-group">
            <input type="text" id="cipher-input" autocomplete="off" spellcheck="false" placeholder="Enter solution">
            <button id="submit-btn">SUBMIT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
